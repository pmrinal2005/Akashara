<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Akashara — Real-time RPA Automation Telemetry Monitor. High-performance virtualized grid streaming 50k records in real-time."
    />
    <title>Akashara — RPA Telemetry Monitor</title>

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      ──────────────────────────────────────────────────────────────────────
      INSTANT HERO VIDEO PRELOAD
      ──────────────────────────────────────────────────────────────────────
      The browser starts downloading the hero clip during the document's
      preload scanner phase, before React even mounts. By the time the
      <video> element is created the bytes are already in the HTTP cache —
      which combined with the in-memory blob cache (src/core/videoCache.ts)
      gives the hero an "instant play" feel.

      For the other 6 section clips we deliberately do NOT add preload
      links here — that would compete with the hero for bandwidth on slow
      networks. They are warmed in parallel from JS after mount, at normal
      priority, while the user is reading the hero copy.
      ──────────────────────────────────────────────────────────────────────
    -->
    <link
      rel="preload"
      as="video"
      type="video/mp4"
      href="/landing_page.mp4"
      fetchpriority="high"
    />

    <script src="/dataStream.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
