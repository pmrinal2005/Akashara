<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Akashara — Real-time RPA Automation Telemetry Monitor. High-performance virtualized grid streaming 50k records in real-time."
    />
    <title>Akashara — RPA Telemetry Monitor</title>

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!--
      ──────────────────────────────────────────────────────────────────────
      INSTANT VIDEO PRELOAD (TASK 1)
      ──────────────────────────────────────────────────────────────────────
      Every background clip is < 1 MB. Preloading ALL of them at document
      preload-scanner phase (BEFORE React mounts) means the browser fires
      the GET requests in parallel right after the HTML body is parsed —
      typically completed well within 2 seconds on broadband.

      Hero gets the highest fetchpriority because it sits above the fold.
      Section clips get default priority so they don't starve the hero's
      bandwidth but still benefit from the early-fetch window.

      The runtime in-memory blob cache (src/core/videoCache.ts) then
      promotes each cached response to a same-origin blob URL, ensuring
      every <video> element starts decoding instantly without any further
      network round-trip.
      ──────────────────────────────────────────────────────────────────────
    -->
    <link rel="preload" as="video" type="video/mp4" href="/landing_page.mp4" fetchpriority="high" />
    <link rel="preload" as="video" type="video/mp4" href="/section1.mp4" fetchpriority="high" />
    <link rel="preload" as="video" type="video/mp4" href="/section2.mp4" fetchpriority="high" />
    <link rel="preload" as="video" type="video/mp4" href="/section3.mp4" fetchpriority="high" />
    <link rel="preload" as="video" type="video/mp4" href="/section4.mp4" fetchpriority="high" />
    <link rel="preload" as="video" type="video/mp4" href="/section5.mp4" fetchpriority="high" />

    <!--
      Inline boot-time blob warmer.  Starts fetching every video into the
      HTTP cache the instant this <head> is parsed — earlier than waiting
      for React to mount and run the in-app warmAll().  Robust to network
      hiccups: every clip is < 1 MB so this typically completes within
      ~1.5 s on a normal broadband connection.
    -->
    <script>
      (function () {
        try {
          var srcs = [
            '/landing_page.mp4',
            '/section1.mp4',
            '/section2.mp4',
            '/section3.mp4',
            '/section4.mp4',
            '/section5.mp4',
          ]
          window.__akasharaVideoBlobs = window.__akasharaVideoBlobs || {}
          srcs.forEach(function (s, idx) {
            var init = { method: 'GET', credentials: 'omit', cache: 'force-cache' }
            try {
              init.priority = idx === 0 ? 'high' : 'high'
            } catch (e) {}
            fetch(s, init)
              .then(function (r) {
                return r.ok ? r.blob() : null
              })
              .then(function (b) {
                if (b) {
                  try {
                    window.__akasharaVideoBlobs[s] = URL.createObjectURL(b)
                  } catch (e) {}
                }
              })
              .catch(function () {
                /* silently ignore — runtime cache will retry */
              })
          })
        } catch (e) {
          /* never block boot */
        }
      })()
    </script>

    <script src="/dataStream.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
